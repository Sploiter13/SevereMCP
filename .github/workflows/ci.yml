name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Import check
        run: python -c "import importlib.util as u; s=u.spec_from_file_location('m','server.py'); m=u.module_from_spec(s); s.loader.exec_module(m); assert len(m.TOOLS) == 22"
      - name: Run tests
        run: pytest -q
